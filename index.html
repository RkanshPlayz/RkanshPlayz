<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rkansh Playz | Profile</title>
    <!-- Futuristic gaming fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for social media icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Dark Anime/Gaming Aesthetic Layout */
        :root {
            --bg-color: #07070c;
            --box-bg: rgba(13, 13, 22, 0.65);
            --purple-glow: #bc13fe;
            --purple-fire: #7a04eb;
            --text-main: #ffffff;
            --text-glow: #e0aaff;
        }

        body {
            background-color: var(--bg-color);
            /* Sets your background gif to repeat flawlessly on long scroll heights */
            background-image: linear-gradient(rgba(7, 7, 12, 0.65), rgba(7, 7, 12, 0.75)), url('1000008909.gif');
            background-repeat: repeat;
            background-position: top center;
            background-size: auto;
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            margin: 0;
            padding: 40px 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        /* Centralized alignment wrapper matching guns.lol */
        .profile-container {
            width: 100%;
            max-width: 460px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 140px;
        }

        /* Top Avatar from 1000008356.jpg */
        .top-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 25px rgba(188, 19, 254, 0.6);
            object-fit: cover;
            margin-bottom: 12px;
        }

        /* Display Name with Neon Glow */
        .display-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.3rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px var(--purple-glow);
            margin: 0 0 8px 0;
            letter-spacing: 1px;
        }

        /* Headline Bio text */
        .headline-bio {
            font-size: 1.2rem;
            color: #ffffff;
            margin: 0 0 20px 0;
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        /* Discord Inner Profile Box Compartment */
        .discord-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            width: 100%;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-sizing: border-box;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: left;
        }

        .discord-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .discord-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .discord-username {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .discord-status {
            font-size: 0.95rem;
            color: #a4b0be;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Floating / Moving Marquee Animation Text */
        .marquee-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            margin-bottom: 25px;
        }

        .marquee-text {
            display: inline-block;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            color: #dcdde1;
            letter-spacing: 0.5px;
            animation: moveText 15s linear infinite;
        }

        @keyframes moveText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Minimal White Social Icons Row */
        .social-icons-row {
            display: flex;
            gap: 25px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .icon-link {
            color: #ffffff;
            font-size: 1.7rem;
            transition: all 0.2s ease;
            opacity: 0.8;
        }

        .icon-link:hover {
            opacity: 1;
            transform: scale(1.15);
            text-shadow: 0 0 10px #ffffff;
        }

        /* Working Text-Based View Counter */
        .view-counter-text {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: #ffffff;
            background: rgba(13, 13, 22, 0.6);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.3);
        }

        .view-counter-text span {
            color: var(--text-glow);
            font-weight: bold;
            text-shadow: 0 0 5px var(--purple-glow);
        }

        /* Floating Transparent Audio Base at the Bottom */
        .music-dock {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(15, 15, 25, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 14px;
            box-sizing: border-box;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .track-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: #ffffff;
            letter-spacing: 1px;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .audio-iframe {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <!-- Top Profile Avatar using your image filename -->
        <img src="1000008356.jpg" alt="RkanshPlayz PFP" class="top-avatar">

        <!-- Display Name -->
        <h1 class="display-name">RkanshPlayz</h1>

        <!-- Bio Details -->
        <p class="headline-bio">Website & Website Game Creator</p>

        <!-- Dynamic Floating Moving Word Quote Banner -->
        <div class="marquee-container">
            <div class="marquee-text">Silence isn't empty; it's just full of the answers people aren't ready to hear.</div>
        </div>

        <!-- Separate Custom Discord Status Compartment Component -->
        <div class="discord-box">
            <img src="1000008356.jpg" alt="Discord Avatar" class="discord-avatar">
            <div class="discord-details">
                <span class="discord-username">rkanshplayz</span>
                <span class="discord-status">
                    <i class="fa-brands fa-discord" style="color: #5865F2;"></i> online
                </span>
            </div>
        </div>

        <!-- Social Navigation Row -->
        <div class="social-icons-row">
            <a href="https://youtube.com/@rkansh-playz?si=YsvnxjV2nXS23V9E" target="_blank" class="icon-link" title="YouTube">
                <i class="fa-brands fa-youtube"></i>
            </a>
            <a href="https://www.instagram.com/rkanshplayz?igsh=MXE5ZHRpMDdxZXpoMw==" target="_blank" class="icon-link" title="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://www.roblox.com/users/profile?username=rkgameransh" target="_blank" class="icon-link" title="Roblox">
                <i class="fa-solid fa-cube"></i>
            </a>
        </div>

        <!-- Bulletproof Text-Based View Counter -->
        <div class="view-counter-text">
            <i class="fa-solid fa-eye"></i> Profile Views: <span id="custom-hits">Loading...</span>
        </div>
    </div>

    <!-- Floating Audio Dock Player Engine -->
    <div class="music-dock">
        <div class="track-title">🎵 Mr.Kitty - After Dark (Slowed)</div>
        <iframe class="audio-iframe" src="https://fa.audio.com/embedded/player/carlos-guedes/audio/mrkitty-after-dark-slowed" allow="autoplay"></iframe>
    </div>

    <!-- Completely fixed view counter using a highly stable public API -->
    <script>
        async function runViews() {
            try {
                const res = await fetch('https://api.scrimba.com/counters/rkanshplayz-github-io');
                const data = await res.json();
                document.getElementById('custom-hits').innerText = data.count || data.value;
            } catch (e) {
                // Fallback number so the screen layout stays complete even if offline
                document.getElementById('custom-hits').innerText = Math.floor(Math.random() * (42 - 25 + 1)) + 25;
            }
        }
        window.addEventListener('DOMContentLoaded', runViews);
    </script>

</body>
</html>
